          format: int32
          type: integer
          example: '0'
        priority_card:
          type: boolean
          example: 'true'
        payment_source_type:
          description: Тип карты, дебетовая/кредитная
          type: string
          example: DebitCard
        financial_product_id:
          type: string
          example: '40817810138980045842'
        mask_number:
          description: Маскированный номер карты
          type: string
          example: 220220******3193
        payment_system_type:
          description: Платежная система MIR,VISA...
          type: string
          example: MIR
        card_logo_url:
          description: 'Ссылка на логотип карты '
          type: string
          example: https://cms-res-web.online.sberbank.ru/sberpay/Card/ds_mc_36_mir_logo.png
        amount_data:
          $ref: '#/components/schemas/AmountData'
        product_name:
          type: string
          example: МИР Сберкарта
