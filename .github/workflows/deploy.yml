name: openclaw-ratatouille-github-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build package
        run: mvn clean package -DskipTests

      - name: Stop existing application
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            DEPLOY_LOCK="/tmp/ratatouille-deploy-debug.lock"
            
            echo "🔒 Creating deployment lock..."
            touch "$DEPLOY_LOCK"
            
            echo "Checking if port 9096 is in use..."
            PID=$(sudo lsof -ti :9096)
              if sudo lsof -ti :9096 >/dev/null 2>&1; then
              echo "Stopping processes on port, 9096..."
              sudo kill -9 "$PID"
            fi

      - name: Upload JAR to project directory
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "target/*.jar"
          target: "/home/user1/ratatouille-debug/"

      - name: Deploy and start application
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e  # Exit on error
            
            cd /home/user1/ratatouille-debug
            
            # Find the latest JAR file
            JAR_FILE=$(ls -t target/*.jar | head -1)
            echo "📦 Deploying: $JAR_FILE"
            
            # Backup previous jar if exists
            if [ -f "$JAR_FILE" ]; then
              BACKUP_NAME="backup_$(date +%Y%m%d_%H%M%S).jar"
              cp "$JAR_FILE" "$BACKUP_NAME"
              echo "✅ Backup created: $BACKUP_NAME"
            fi
            
            # Start the application
            echo "🚀 Starting application..."
            nohup java -jar "$JAR_FILE" > app.log 2>&1 &
            
            # Save PID to file
            echo $! > app.pid
            echo "📝 PID saved: $(cat app.pid)"
            
            # Wait for application to start
            echo "⏳ Waiting for application to start..."
            sleep 20
            
            # Health check with retry logic
            MAX_RETRIES=6
            RETRY_COUNT=0
            until curl -f http://localhost:9096/actuator/health || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "❌ Health check failed, retry $RETRY_COUNT/$MAX_RETRIES..."
              sleep 10
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "💥 Health check failed after $MAX_RETRIES attempts"
              echo "=== Application logs ==="
              tail -50 app.log
              echo "=== Process info ==="
              ps aux | grep java
              exit 1
            fi
            
            echo "✅ Deployment successful! Application is healthy."
            echo "🌐 Health check response:"
            curl -s http://localhost:9096/actuator/health | head -10

      - name: Clean Up
        uses: appleboy/ssh-action@v0.1.6
        if: always()
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            DEPLOY_LOCK="/tmp/ratatouille-deploy-debug.lock"
            
            if [ -f "$DEPLOY_LOCK" ]; then
                echo "🔓 Removing deployment lock..."
                rm -f "$DEPLOY_LOCK"
            fi