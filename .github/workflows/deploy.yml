name: ci

# Только CI (тесты). Авто-деплой на push в main УБРАН: деплой теперь ручной и
# централизованный — через репо ratatouille-deploy (workflow_dispatch).
# Полная интеграция ratatouille-tools в центральный CD — отдельная фаза (докеризация
# либо kind=jar+systemd); до неё этот сервис централизованно не деплоится.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test
