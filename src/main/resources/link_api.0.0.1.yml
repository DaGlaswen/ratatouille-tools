components:
  schemas:
    coin.Coin:
      type: string
      x-enum-varnames:
        - ETH
        - BTC
        - USDT
        - TON
    SessionIDRequest:
      required:
        - redirect_uri
      type: object
      properties:
        redirect_uri:
          type: string
          example: testapp://test
    SessionIDResponse:
      type: object
      properties:
        client_id:
          type: string
          example: 9f80261c-3455-4942-be48-cd1b2a2d7ba5
        code_challenge:
          type: string
          example: XB8NnQ6olzV3bujaRIGW5kBJVbi6f-JKLOZD6TOTmU4
        code_challenge_method:
          type: string
          example: S256
        deeplink:
          type: string
          example: sberbankid?client_id=9f80261c-3455-4942-be48-cd1b2a2d7ba5&state=kIiyl2YIfrE&scope=openid&code_challenge_method=S256&code_challenge=XB8NnQ6olzV3bujaRIGW5kBJVbi6f-JKLOZD6TOTmU4&redirect_uri=testapp://test&nonce=gz879YXtsha8bjDE59ZtD4oiEe03O8N3IRX62B322AKbyi0t93ItmJyB9j23FQo6
        nonce:
          type: string
          example: gz879YXtsha8bjDE59ZtD4oiEe03O8N3IRX62B322AKbyi0t93ItmJyB9j23FQo6
        scope:
          type: string
          example: openid
        session_id:
          type: string
          example: '964901957800673280'
        state:
          type: string
          example: kIiyl2YIfrE
    Account:
      type: object
      properties:
        first_name:
          type: string
          example: Кристина
        gender:
          type: integer
          example: '2'
        id:
          type: string
          example: e33eaee2-f0e5-48ac-b0e2-63ecae94ae48
        last_name:
          type: string
          example: У.
    AmountData:
      type: object
      properties:
        amount:
          type: number
          example: '10000'
        currency:
          description: Курс валюты
          type: string
          example: RUR
    AuthMerchant:
      type: object
      properties:
        access_token:
          type: string
        default_currency:
          type: string
        default_wallet_id:
          type: string
        id:
          type: string
        login:
          type: string
        name:
          type: string
        refresh_token:
          type: string
        session_id:
          type: string
    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    Balance:
      type: object
      properties:
        id:
          description: Айди баланса кошелька
          type: string
          example: baae9836-ec40-4553-ae3d-d242d2e4da3a
        type:
          description: Тип баланса в кошельке
          type: string
          example: FREE
        value:
          description: Количество монеты на конкретном балансе в минимальных единицах этой валюты
          type: string
          example: '100000'
      example:
        id: baae9836-ec40-4553-ae3d-d242d2e4da3a
        value: '0'
        type: VERIFICATION
    BuyTicketRequest:
      required:
        - amount
        - buyer_card_id
        - buyer_user_id
        - buyer_wallet_id
        - ticket_id
        - transaction_key
      type: object
      properties:
        amount:
          description: Сумма в копейках - то насколько хочет купить валюты покупатель
          type: integer
          example: '100000'
        buyer_card_id:
          description: uuid карты покупателя
          type: string
          example: 6ac0bb7e-4977-4bc7-b994-a2f56d6dc690
        buyer_user_id:
          description: uuid юзера покупателя
          type: string
          example: 51a47f6d-75fb-492a-b643-7b05606a6b99
        buyer_wallet_id:
          description: uuid кошелька
          type: string
          example: 21bf3528-bf81-41af-b852-7ff85499cd74
        ticket_id:
          description: uuid тикета
          type: string
          example: 95120802-0dc5-447e-8fa2-f8739266b3ec
        transaction_key:
          description: ключ idempotency
          type: string
          example: 6ac0bb7e-4977-4bc7-b994-a2f56d6dc690
    C2CHistoryTransaction:
      type: object
      properties:
        buyer_user_id:
          type: string
        buyer_wallet_id:
          type: string
        c2c_status:
          type: string
        card_number:
          type: string
        card_system_type:
          type: string
        coin:
          $ref: '#/components/schemas/coin.Coin'
        commission_value:
          type: integer
        created:
          type: string
        fiat_value:
          type: integer
        id:
          type: string
        seller_id:
          type: string
        seller_wallet_id:
          type: string
        state:
          type: string
        updated:
          type: string
        value:
          type: string
    CloseOrderRequest:
      type: object
      properties:
        order_id:
          type: string
    CloseTicketRequest:
      required:
        - ticket_id
      type: object
      properties:
        ticket_id:
          description: uuid тикета, который нужно закрыть
          type: string
          example: 95120802-0dc5-447e-8fa2-f8739266b3ec
    ConvertRequest:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        value:
          type: string
    ConvertResponse:
      type: object
      properties:
        from:
          type: string
        original_value:
          type: string
        to:
          type: string
        value:
          type: string
    CreateOrderRequest:
      type: object
      properties:
        coin:
          type: string
        currency:
          type: string
        merchant_amount:
          type: number
        merchant_id:
          type: string
        merchant_wallet_id:
          type: string
    CreateOrderResponse:
      type: object
      properties:
        order_id:
          type: string
    CreateTicketForSaleRequest:
      required:
        - card_id
        - coin
        - coin_count
        - coin_price
        - min_limit
        - user_id
        - wallet_id
      type: object
      properties:
        card_id:
          description: uuid карты на которую пользователь хочет получать деньги от продажи
          type: string
          example: c80c235d-bc18-4703-a7ad-d448c0305dae
        coin:
          description: Монета
          type: string
          example: ETH
        coin_count:
          description: Количество монет в минимальных единицах. Для eth это wei и тд.
          type: string
          example: '5600000000000000000'
        coin_price:
          description: Сумма в копейках за 1 целую монету
          type: integer
          example: '100000'
        min_limit:
          description: Минимальный лимит на покупку тикета в копейках
          minimum: 10000
          type: integer
          example: '10000'
        user_id:
          description: uuid пользователя который создает тикет
          type: string
          example: e33eaee2-f0e5-48ac-b0e2-63ecae94ae48
        wallet_id:
          description: uuid кошелька с которого берется валюта для тикета
          type: string
          example: 8af406fa-950e-448c-8632-7d406db7ae92
      example:
        user_id: e33eaee2-f0e5-48ac-b0e2-63ecae94ae48
        wallet_id: 8af406fa-950e-448c-8632-7d406db7ae92
        card_id: c80c235d-bc18-4703-a7ad-d448c0305dae
        coin: ETH
        coin_price: 100000
        coin_count: '5600000000000000000'
        min_limit: 10000
    CreateWallet:
      type: object
      properties:
        coin:
          type: string
          example: ETH
      example:
        coin: ETH
    Currency:
      type: object
      properties:
        code:
          type: string
        type:
          type: string
    EditMerchantInfo:
