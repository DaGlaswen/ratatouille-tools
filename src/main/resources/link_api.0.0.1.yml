          in: header
          required: true
        - name: cookie
          description: Куки для авторизации от SberPay
          schema:
            type: string
            example: X-Geo-Sticky=DM
          in: cookie
          required: true
        - name: X-Pod-Sticky
          description: rquid
          schema:
            type: string
            example: 0ec35cc52cb49c3e5607b1370d36fa02
          in: header
          required: true
        - name: X-B3-TraceId
          description: rquid
          schema:
            type: string
            example: 6bfd228dc00d216b
          in: header
          required: true
      responses:
        '200':
          content:
